<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — SierraLearn</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="mesh-bg" aria-hidden="true"><div class="mesh-orb mesh-orb-1"></div><div class="mesh-orb mesh-orb-2"></div></div>

<nav class="navbar" role="navigation">
  <div class="wide-container navbar-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      Sierra<span>Learn</span>
    </a>
    <div class="nav-right"></div>
  </div>
</nav>

<div class="page-wrap">
<main>
<div class="wide-container" style="padding-top:var(--sp-5);padding-bottom:var(--sp-8);">

  <div class="profile-layout">

    <!-- LEFT: Profile card -->
    <div>
      <div class="profile-card">
        <!-- Avatar -->
        <div class="profile-avatar-wrap" id="avatar-wrap">
          <div class="profile-avatar-initials" id="avatar-initials">??</div>
          <label class="profile-avatar-edit" for="avatar-input" title="Change photo">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
          </label>
          <input type="file" id="avatar-input" accept="image/*" style="display:none;">
        </div>

        <!-- Name (editable) -->
        <div id="name-display">
          <div class="profile-name" id="profile-name-text">Loading…</div>
          <button id="edit-name-btn" style="background:none;border:none;font-size:0.85rem;color:var(--sky-dark);cursor:pointer;font-family:'Satoshi',sans-serif;font-weight:600;margin-top:2px;">✏️ Edit name</button>
        </div>
        <div id="name-edit" style="display:none;margin-bottom:var(--sp-2);">
          <input type="text" id="name-input" class="form-input" style="text-align:center;margin-bottom:8px;" placeholder="Full name">
          <div style="display:flex;gap:8px;justify-content:center;">
            <button class="btn btn-ghost" id="name-cancel" style="font-size:0.85rem;padding:7px 14px;">Cancel</button>
            <button class="btn btn-primary" id="name-save" style="font-size:0.85rem;padding:7px 16px;">Save</button>
          </div>
        </div>

        <div class="profile-email" id="profile-email">—</div>
        <span class="nav-role-badge" id="profile-role-badge" style="display:inline-block;margin-bottom:var(--sp-2);">—</span>

        <!-- Stats grid -->
        <div class="profile-stat-row" id="profile-stats">
          <div class="profile-stat"><div class="profile-stat-num" id="ps-total">0</div><div class="profile-stat-label">Uploads</div></div>
          <div class="profile-stat"><div class="profile-stat-num" id="ps-approved">0</div><div class="profile-stat-label">Approved</div></div>
          <div class="profile-stat"><div class="profile-stat-num" id="ps-pending">0</div><div class="profile-stat-label">Pending</div></div>
          <div class="profile-stat"><div class="profile-stat-num" id="ps-rejected" style="color:var(--red);">0</div><div class="profile-stat-label">Rejected</div></div>
        </div>

        <div style="margin-top:var(--sp-3);padding-top:var(--sp-3);border-top:1px solid var(--border);">
          <div class="profile-stat-row">
            <div class="profile-stat"><div class="profile-stat-num" id="ps-downloads" style="color:var(--sky-dark);">0</div><div class="profile-stat-label">Total DL</div></div>
            <div class="profile-stat"><div class="profile-stat-num" id="ps-likes" style="color:var(--red);">0</div><div class="profile-stat-label">Total Likes</div></div>
          </div>
        </div>

        <a href="index.html" class="btn btn-outline btn-full" style="margin-top:var(--sp-3);">← Back to Library</a>
      </div>
    </div>

    <!-- RIGHT: Content -->
    <div class="profile-main">

      <!-- My Resources tabs -->
      <div class="profile-section">
        <div class="profile-section-header">
          <h2>My Resources</h2>
          <div style="display:flex;gap:4px;">
            <button class="btn btn-xs btn-primary" data-filter="all" id="tab-all">All</button>
            <button class="btn btn-xs btn-outline" data-filter="approved" id="tab-approved">Approved</button>
            <button class="btn btn-xs btn-outline" data-filter="pending" id="tab-pending">Pending</button>
            <button class="btn btn-xs btn-outline" data-filter="rejected" id="tab-rejected">Rejected</button>
          </div>
        </div>
        <div id="resources-list">
          <div style="text-align:center;padding:var(--sp-4);color:var(--text-muted);">Loading your resources…</div>
        </div>
      </div>

    </div>
  </div>
</div>
</main>

<footer class="footer"><div class="wide-container footer-inner"><div><div class="footer-logo">Sierra<span>Learn</span></div><div class="footer-sub">Open educational resources for Sierra Leone · MIT License</div></div><nav class="footer-links"><a href="index.html">Library</a><a href="upload.html">Upload</a><a href="privacy.html">Privacy</a></nav></div></footer>
</div>

<div class="alert-top" id="sl-alert-top"></div>

<script type="module">
  import { initAuth, currentProfile } from './auth.js';
  import { fetchMyResources, updateProfile, uploadAvatar } from './supabase.js';

  const SVG = {
    pdf:`<svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="10" fill="#ef4444"/><text x="24" y="32" text-anchor="middle" font-family="Arial" font-size="9" font-weight="800" fill="white">PDF</text></svg>`,
    doc:`<svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="10" fill="#2563eb"/></svg>`,
    vid:`<svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="10" fill="#d97706"/></svg>`,
    img:`<svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="10" fill="#16a34a"/></svg>`,
    link:`<svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="10" fill="#7c3aed"/></svg>`,
  };

  function alertTop(msg,type='success'){
    const el=document.getElementById('sl-alert-top');
    el.className=`alert-top alert-top-${type}`;
    el.innerHTML=`<span class="alert-top-icon alert-icon-${type}"><svg viewBox="0 0 20 20" fill="currentColor" style="width:14px;height:14px"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg></span><span>${msg}</span>`;
    void el.offsetWidth;el.classList.add('alert-top-show');
    setTimeout(()=>el.classList.remove('alert-top-show'),3800);
  }

  function sx(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function fmtDate(iso){return!iso?'—':new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}

  let allResources=[];
  let currentFilter='all';
  let profile=null;

  document.addEventListener('DOMContentLoaded',async()=>{
    profile=await initAuth();
    if(!profile){window.location.href='login.html';return;}

    renderProfileCard(profile);
    await loadResources();
    bindTabs();
    bindAvatarUpload();
    bindNameEdit();
  });

  function renderProfileCard(p){
    const initials=p.full_name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const avatarWrap=document.getElementById('avatar-wrap');
    if(p.avatar_url){
      avatarWrap.innerHTML=`
        <img src="${p.avatar_url}" alt="${sx(initials)}" class="profile-avatar-img" id="avatar-img">
        <label class="profile-avatar-edit" for="avatar-input" title="Change photo">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
        </label>
        <input type="file" id="avatar-input" accept="image/*" style="display:none;">`;
    } else {
      document.getElementById('avatar-initials').textContent=initials;
    }
    document.getElementById('profile-name-text').textContent=p.full_name;
    document.getElementById('name-input').value=p.full_name;
    document.getElementById('profile-email').textContent=p.email;
    const badge=document.getElementById('profile-role-badge');
    badge.textContent=p.role;badge.className=`nav-role-badge nav-role-${p.role}`;
  }

  async function loadResources(){
    try{
      allResources=await fetchMyResources(profile.id);
      /* Compute stats */
      const approved=allResources.filter(r=>r.status==='approved');
      const pending=allResources.filter(r=>r.status==='pending');
      const rejected=allResources.filter(r=>r.status==='rejected');
      const totalDL=allResources.reduce((s,r)=>s+(r.downloads||0),0);
      const totalLikes=allResources.reduce((s,r)=>s+(r.like_count||0),0);
      document.getElementById('ps-total').textContent=allResources.length;
      document.getElementById('ps-approved').textContent=approved.length;
      document.getElementById('ps-pending').textContent=pending.length;
      document.getElementById('ps-rejected').textContent=rejected.length;
      document.getElementById('ps-downloads').textContent=totalDL.toLocaleString();
      document.getElementById('ps-likes').textContent=totalLikes.toLocaleString();
      renderResources('all');
    }catch(e){
      document.getElementById('resources-list').innerHTML=`<div style="color:var(--red);padding:var(--sp-3);">Failed to load: ${e.message}</div>`;
    }
  }

  function renderResources(filter){
    currentFilter=filter;
    const list=document.getElementById('resources-list');
    let items=filter==='all'?allResources:allResources.filter(r=>r.status===filter);
    if(!items.length){
      list.innerHTML=`<div style="text-align:center;padding:var(--sp-5);color:var(--text-muted);font-size:0.95rem;">
        ${filter==='all'?'You haven\'t uploaded any resources yet. <a href="upload.html" style="color:var(--sky-dark);font-weight:600;">Upload your first resource →</a>':'No '+filter+' resources.'}
      </div>`;
      return;
    }
    list.innerHTML='';
    items.forEach(r=>{
      const statusClass=r.status==='approved'?'status-approved':r.status==='rejected'?'status-rejected':'status-pending';
      const div=document.createElement('div');div.className='profile-resource-item';
      div.innerHTML=`
        <div class="profile-resource-icon">${SVG[r.type]||SVG.doc}</div>
        <div class="profile-resource-info">
          <div class="profile-resource-title">${sx(r.title)}</div>
          <div class="profile-resource-meta">${sx(r.subject)} · ${sx(r.level)} · ${fmtDate(r.created_at)}</div>
          ${r.status==='rejected'&&r.rejection_note
            ?`<div class="rejection-note">❌ Rejection reason: ${sx(r.rejection_note)}</div>`
            :''}
        </div>
        <div class="profile-resource-stats">
          <span class="profile-resource-stat" style="color:var(--sky);" title="Downloads">
            <svg viewBox="0 0 20 20" fill="currentColor" style="width:13px;height:13px"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
            ${(r.downloads||0).toLocaleString()}
          </span>
          <span class="profile-resource-stat" style="color:var(--red);" title="Likes">
            <svg viewBox="0 0 20 20" fill="currentColor" style="width:13px;height:13px"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"/></svg>
            ${(r.like_count||0).toLocaleString()}
          </span>
          <span class="profile-resource-stat" style="color:var(--yellow);" title="Rating">
            <svg viewBox="0 0 20 20" fill="currentColor" style="width:13px;height:13px"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
            ${r.rating_count?Math.round(r.rating_sum/r.rating_count*10)/10:'0'}
          </span>
          <span class="status-badge ${statusClass}">${r.status}</span>
        </div>`;
      if(r.status==='approved'){
        div.addEventListener('click',()=>{window.location.href=`resource.html?id=${r.id}`;});
      }
      list.appendChild(div);
    });
  }

  function bindTabs(){
    document.querySelectorAll('[data-filter]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('[data-filter]').forEach(b=>{b.className='btn btn-xs btn-outline';});
        btn.className='btn btn-xs btn-primary';
        renderResources(btn.dataset.filter);
      });
    });
  }

  function bindAvatarUpload(){
    document.addEventListener('change',async e=>{
      if(e.target.id!=='avatar-input')return;
      const file=e.target.files[0];
      if(!file)return;
      if(file.size>5*1024*1024){alertTop('Image too large — max 5 MB','warn');return;}
      alertTop('Uploading photo…','success');
      try{
        const url=await uploadAvatar(file,profile.id);
        await updateProfile({userId:profile.id,avatarUrl:url});
        /* Update UI */
        const wrap=document.getElementById('avatar-wrap');
        const existing=wrap.querySelector('img');
        if(existing){existing.src=url;}
        else{
          wrap.innerHTML=`
            <img src="${url}" alt="avatar" class="profile-avatar-img">
            <label class="profile-avatar-edit" for="avatar-input" title="Change photo">
              <svg viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
            </label>
            <input type="file" id="avatar-input" accept="image/*" style="display:none;">`;
        }
        alertTop('Profile photo updated ✓','success');
      }catch(err){alertTop('Upload failed: '+err.message,'warn');}
    });
  }

  function bindNameEdit(){
    document.getElementById('edit-name-btn').addEventListener('click',()=>{
      document.getElementById('name-display').style.display='none';
      document.getElementById('name-edit').style.display='block';
      document.getElementById('name-input').focus();
    });
    document.getElementById('name-cancel').addEventListener('click',()=>{
      document.getElementById('name-edit').style.display='none';
      document.getElementById('name-display').style.display='block';
    });
    document.getElementById('name-save').addEventListener('click',async()=>{
      const newName=document.getElementById('name-input').value.trim();
      if(!newName){alertTop('Name cannot be empty','warn');return;}
      const btn=document.getElementById('name-save');
      btn.classList.add('btn-loading');btn.disabled=true;
      try{
        await updateProfile({userId:profile.id,fullName:newName});
        document.getElementById('profile-name-text').textContent=newName;
        document.getElementById('name-edit').style.display='none';
        document.getElementById('name-display').style.display='block';
        alertTop('Name updated ✓','success');
        /* Refresh nav */
        setTimeout(()=>location.reload(),1200);
      }catch(err){alertTop('Update failed: '+err.message,'warn');}
      finally{btn.classList.remove('btn-loading');btn.disabled=false;}
    });
  }
</script>
</body>
</html>
