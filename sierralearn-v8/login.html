<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — SierraLearn</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      Sierra<span>Learn</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your SierraLearn account</p>

    <div class="auth-error" id="auth-error"></div>

    <form id="login-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div style="position:relative;">
          <input type="password" id="password" class="form-input" placeholder="Your password" required autocomplete="current-password" style="padding-right:48px;">
          <button type="button" id="toggle-pw" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-faint);cursor:pointer;padding:0;" aria-label="Toggle password visibility">
            <svg id="pw-eye" viewBox="0 0 20 20" fill="currentColor" style="width:18px;height:18px"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn" style="margin-top:8px;">
        Sign In
      </button>

    </form>

    <p class="auth-link">Don't have an account? <a href="signup.html">Create one free</a></p>
    <p class="auth-link" style="margin-top:8px;"><a href="index.html" style="color:var(--text-muted);">← Continue as guest</a></p>

  </div>
</div>

<script type="module">
  import { signIn } from './supabase.js';
  import { getSession } from './supabase.js';

  /* Redirect if already logged in */
  getSession().then(s => { if (s) window.location.href = 'index.html'; });

  /* Password toggle */
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submit-btn');
    const errEl    = document.getElementById('auth-error');
    errEl.classList.remove('show');

    if (!email || !password) {
      errEl.textContent = 'Please enter your email and password.';
      errEl.classList.add('show'); return;
    }

    btn.classList.add('btn-loading'); btn.disabled = true;

    try {
      await signIn({ email, password });
      /* Redirect to originally intended page or library */
      const next = new URLSearchParams(window.location.search).get('next') || 'index.html';
      window.location.href = next;
    } catch (err) {
      btn.classList.remove('btn-loading'); btn.disabled = false;
      errEl.textContent = err.message || 'Sign in failed. Please check your credentials.';
      errEl.classList.add('show');
    }
  });
</script>
</body>
</html>
